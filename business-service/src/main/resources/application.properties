spring.application.name=business-service
server.port=${SERVER_PORT:8083}

# ── PostgreSQL datasource ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5083/business_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Event Service URL (used by EventClient Feign) ────────────────────
event-service.url=${EVENT_SERVICE_URL:http://localhost:8082}
auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}
