apiVersion: v1
kind: Namespace
metadata:
  name: soa-local
---
apiVersion: v1
kind: Secret
metadata:
  name: soa-secrets
  namespace: soa-local
type: Opaque
stringData:
  DB_USERNAME: db_user
  DB_PASSWORD: db_password
  AUTH_JWT_SECRET: replace-this-with-a-long-dev-secret-key-for-auth-service-2026
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: soa-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: auth_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: soa-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soa-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: soa-local
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-db
  namespace: soa-local
spec:
